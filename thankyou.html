<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Received — Algorithm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:           #1A1D23;
  --bg-elevated:  #21252D;
  --bg-card:      #2A2F3A;
  --border:       #3A4050;
  --border-light: #4A5060;
  
  --text:         #FFFFFF;
  --text-muted:   #9BA3B4;
  --text-dim:     #6B7280;
  
  --cyan:         #00D4FF;
  --cyan-hover:   #33DDFF;
  --cyan-dim:     rgba(0,212,255,0.1);
  --cyan-border:  rgba(0,212,255,0.3);
  
  --red:          #FF4757;
  --red-dim:      rgba(255,71,87,0.1);
  --green:        #1DD1A1;
  --green-dim:    rgba(29,209,161,0.1);
  --amber:        #FFC107;
  --amber-dim:    rgba(255,193,7,0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════════════════════
   CARD
══════════════════════════════════════════════════════════ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  max-width: 540px;
  width: 100%;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

.check-circle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--green-dim);
  border: 2px solid var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
}
@keyframes pop { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }

.check-circle svg {
  stroke-dasharray: 50;
  stroke-dashoffset: 50;
  animation: draw 0.4s ease 0.6s forwards;
}
@keyframes draw { to { stroke-dashoffset: 0; } }

h1 {
  font-size: 1.75rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  text-align: center;
  margin-bottom: 10px;
  color: var(--text);
}
h1 .highlight { color: var(--cyan); }

.subtitle {
  text-align: center;
  font-size: 0.92rem;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 32px;
}

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 0 0 28px;
}

.section-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ══════════════════════════════════════════════════════════
   TASK ROWS
══════════════════════════════════════════════════════════ */
.task-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 13px 16px;
  border-radius: 10px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  transition: all 0.2s;
}
.task-row:last-child { margin-bottom: 0; }
.task-row:hover {
  border-color: var(--border-light);
  background: var(--bg-card);
}

.task-row.urgent {
  background: var(--red-dim);
  border-color: var(--red);
}
.task-row.normal {
  background: var(--amber-dim);
  border-color: var(--amber);
}
.task-row.planned {
  background: var(--green-dim);
  border-color: var(--green);
}

.task-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 6px;
}
.urgent .task-dot { background: var(--red); }
.normal .task-dot { background: var(--amber); }
.planned .task-dot { background: var(--green); }

.task-content { flex: 1; }
.task-what {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.5;
}
.task-eta {
  font-size: 0.76rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 5px;
}
.urgent .task-eta { color: var(--red); }
.normal .task-eta { color: var(--amber); }
.planned .task-eta { color: var(--green); }

/* ══════════════════════════════════════════════════════════
   NEXT STEPS
══════════════════════════════════════════════════════════ */
.next-block {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  margin-bottom: 28px;
}
.next-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 14px;
}
.next-item:last-child { margin-bottom: 0; }

.next-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--cyan);
  color: #000;
  font-size: 0.7rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.next-text {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.6;
}
.next-text strong {
  color: var(--text);
  font-weight: 500;
}

/* ══════════════════════════════════════════════════════════
   BUTTON
══════════════════════════════════════════════════════════ */
.btn-another {
  display: block;
  text-align: center;
  background: var(--cyan);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 13px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  width: 100%;
  letter-spacing: 0.01em;
}
.btn-another:hover {
  background: var(--cyan-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,212,255,0.3);
}

/* ══════════════════════════════════════════════════════════
   LOGO
══════════════════════════════════════════════════════════ */
.logo {
  text-align: center;
  margin-top: 28px;
  opacity: 0.5;
}
.logo svg {
  height: 24px;
  width: auto;
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; }
  h1 { font-size: 1.5rem; }
}
</style>
</head>

<script>
const UMAP = {
  urgent:  { eta: 'Same day or within 24 hours', ackLine: 'We\'ll be in touch within <strong>2 business hours</strong> to confirm.' },
  normal:  { eta: '2–5 business days',           ackLine: 'We\'ll pick this up in our <strong>active sprint</strong> within 2–5 business days.' },
  planned: { eta: '1–3 weeks',                   ackLine: 'We\'ll <strong>confirm a schedule</strong> and get back to you within a few days.' },
};

const data = (() => {
  try { return JSON.parse(sessionStorage.getItem('__brief') || 'null'); }
  catch(e) { return null; }
})();

if (data && data.tasks?.length) {
  const firstName = (data.name || '').split(' ')[0];
  if (firstName) {
    document.getElementById('heading').innerHTML = `Got it, <span class="highlight">${firstName}</span>`;
    document.getElementById('subtitle').textContent =
      `Thanks — a confirmation email is on its way to you. Here's what you submitted:`;
  }

  // Task rows
  const ord = { urgent: 0, normal: 1, planned: 2 };
  const sorted = [...data.tasks].sort((a,b) => (ord[a.urg]??1) - (ord[b.urg]??1));
  const taskList = document.getElementById('taskList');

  sorted.forEach(t => {
    const u = UMAP[t.urg] || UMAP.normal;
    const row = document.createElement('div');
    row.className = `task-row ${t.urg || 'normal'}`;
    row.innerHTML = `
      <div class="task-dot"></div>
      <div class="task-content">
        <div class="task-what">${t.what}</div>
        <div class="task-eta">⏱ ${u.eta}</div>
      </div>`;
    taskList.appendChild(row);
  });

  // Next steps
  const types = [...new Set(sorted.map(t => t.urg || 'normal'))];
  const nextBlock = document.getElementById('nextBlock');
  let nextHTML = '';
  types.forEach((type, i) => {
    const u = UMAP[type] || UMAP.normal;
    nextHTML += `
      <div class="next-item">
        <div class="next-num">${i+1}</div>
        <div class="next-text">${u.ackLine}</div>
      </div>`;
  });
  nextHTML += `
    <div class="next-item">
      <div class="next-num">${types.length+1}</div>
      <div class="next-text">A <strong>confirmation email</strong> has been sent to you with this summary.</div>
    </div>
    <div class="next-item">
      <div class="next-num">${types.length+2}</div>
      <div class="next-text">Reply to that email any time if <strong>urgency changes</strong> or you have more to add.</div>
    </div>`;
  nextBlock.innerHTML = nextHTML;

} else {
  document.getElementById('taskList').innerHTML =
    `<p style="font-size:0.88rem;color:var(--text-muted);padding:14px 0">Your request has been sent. Check your inbox for a confirmation.</p>`;
  document.getElementById('nextBlock').innerHTML = `
    <div class="next-item"><div class="next-num">1</div><div class="next-text">Our team reviews your brief and confirms priorities.</div></div>
    <div class="next-item"><div class="next-num">2</div><div class="next-text">A <strong>confirmation email</strong> is on its way with your turnaround times.</div></div>
    <div class="next-item"><div class="next-num">3</div><div class="next-text">Reply to that email any time if anything changes.</div></div>`;
}

sessionStorage.removeItem('__brief');
</script>
